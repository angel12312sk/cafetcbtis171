<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago cancelado — Cafetería CBTis 171</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700;900&display=swap">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{background:#1a1a1a;border:1px solid rgba(255,255,255,.08);padding:52px 48px;max-width:460px;width:100%}
  .icon{font-size:64px;margin-bottom:24px;display:block}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;text-transform:uppercase;margin-bottom:12px}
  p{font-size:14px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:28px}
  .btn{display:inline-block;background:#F5A623;color:#000;padding:14px 36px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:background .2s;margin:8px}
  .btn:hover{background:#D4891A}
  .btn-sec{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
  .btn-sec:hover{border-color:#F5A623;color:#F5A623;background:transparent}
</style>
</head>
<body>
<div class="card">
  <span class="icon">❌</span>
  <h1>Pago cancelado</h1>
  <p>No se realizó ningún cargo. Puedes intentarlo de nuevo cuando quieras.</p>
  <a href="javascript:history.back()" class="btn">Reintentar pago</a>
  <a href="index.html" class="btn btn-sec">Volver al inicio</a>
</div>
</body>
</html>
