<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago exitoso — Cafetería CBTis 171</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700;900&display=swap">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{background:#1a1a1a;border:1px solid rgba(255,255,255,.08);padding:52px 48px;max-width:460px;width:100%}
  .icon{font-size:64px;margin-bottom:24px;display:block}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;text-transform:uppercase;margin-bottom:12px}
  p{font-size:14px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:28px}
  .folio{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:#F5A623;padding:14px 24px;font-size:13px;margin-bottom:28px;letter-spacing:1px}
  .btn{display:inline-block;background:#F5A623;color:#000;padding:14px 36px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:background .2s}
  .btn:hover{background:#D4891A}
</style>
</head>
<body>
<div class="card">
  <span class="icon">✅</span>
  <h1>¡Pago exitoso!</h1>
  <p>Tu pedido ha sido registrado y está siendo preparado. Preséntate en la cafetería con tu número de folio.</p>
  <div class="folio" id="folioBox">Cargando folio...</div>
  <a href="index.html" class="btn">Volver al inicio</a>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const pedido = params.get('pedido');
  document.getElementById('folioBox').textContent = pedido ? 'Folio #' + pedido : 'Pedido registrado';
</script>
</body>
</html>
